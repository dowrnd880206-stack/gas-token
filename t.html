<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>개안심 점검 결과 토큰</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, "Noto Sans KR", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f8fafc;
    padding: 16px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    padding: 28px 24px 32px;
    text-align: center;
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 18px;
  }

  .logo {
    display: block;
    max-width: 240px;
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  .card h2 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 700;
    color: #0f172a;
    line-height: 1.4;
  }

  .desc {
    margin: 0 0 16px;
    font-size: 13px;
    color: #64748b;
    line-height: 1.5;
  }

  .token {
    font-family: "Courier New", monospace;
    font-size: 10px;
    line-height: 1.6;
    word-break: break-all;
    background: #f1f5f9;
    color: #334155;
    padding: 14px;
    border-radius: 8px;
    margin: 0 0 20px;
    text-align: left;
    max-height: 120px;
    overflow-y: auto;
    user-select: all;
    -webkit-user-select: all;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: #3b82f6;
    color: #ffffff;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn:hover {
    background: #2563eb;
  }

  .btn:active {
    background: #1d4ed8;
  }

  .ok {
    display: none;
    margin-top: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #16a34a;
  }

  .err {
    display: none;
    margin-top: 14px;
    font-size: 14px;
    font-weight: 600;
    color: #dc2626;
  }

  .empty-state {
    padding: 40px 0;
    color: #94a3b8;
    font-size: 15px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img
        class="logo"
        src="img_ci1.png"
        alt="홈앤서비스 SK브로드밴드 로고"
      >
    </div>

    <h2>개안심 점검 결과 토큰</h2>
    <div class="desc">🐶 아래 토큰을 복사하여 전달해주세요.</div>
    <div id="content"></div>
  </div>

<script>
(function () {
  var raw = location.hash.slice(1);
  var token = '';

  try {
    token = decodeURIComponent(raw);
  } catch (e) {
    token = raw;
  }

  var el = document.getElementById('content');

  if (!token) {
    el.innerHTML = '<div class="empty-state">토큰 정보가 없습니다.</div>';
    return;
  }

  el.innerHTML =
    '<div class="token" id="tv"></div>' +
    '<button class="btn" id="copyBtn" type="button">복사하기</button>' +
    '<div class="ok" id="ok">복사됨! 메신저에 붙여넣기 하세요.</div>' +
    '<div class="err" id="err">복사에 실패했습니다. 위 토큰을 직접 선택해서 복사해주세요.</div>';

  document.getElementById('tv').textContent = token;

  document.getElementById('copyBtn').addEventListener('click', function () {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(token).then(function () {
        document.getElementById('ok').style.display = 'block';
        document.getElementById('err').style.display = 'none';
      }).catch(function () {
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
  });

  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = token;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();

    try {
      var copied = document.execCommand('copy');
      document.getElementById('ok').style.display = copied ? 'block' : 'none';
      document.getElementById('err').style.display = copied ? 'none' : 'block';
    } catch (e) {
      document.getElementById('ok').style.display = 'none';
      document.getElementById('err').style.display = 'block';
    }

    document.body.removeChild(ta);
  }
})();
</script>
</body>
</html>
